<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Perplexity Computer -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobBot</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #6c63ff;
      --accent2: #4ade80;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #f0f0f5;
      --text2: #9090a8;
      --text3: #5a5a72;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo svg { width: 32px; height: 32px; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .stats-bar {
      display: flex;
      gap: 24px;
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-val.green { color: var(--accent2); }
    .stat-val.purple { color: var(--accent); }

    /* ── Date picker ── */
    .date-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 73px);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }
    .sidebar-header {
      padding: 0 16px 12px;
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .job-card {
      padding: 14px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .job-card:hover { background: var(--surface); }
    .job-card.active {
      background: var(--surface);
      border-left-color: var(--accent);
    }
    .job-card.status-sent { border-left-color: var(--accent2); }
    .job-card.status-skipped { opacity: 0.45; }
    .job-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .job-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .score-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .score-badge.high { background: rgba(108,99,255,0.15); color: var(--accent); }
    .score-badge.med { background: rgba(245,158,11,0.15); color: var(--warn); }
    .job-company {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .job-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
    }
    .tag-source { background: var(--surface2); color: var(--text3); }
    .tag-status-pending { background: rgba(245,158,11,0.12); color: var(--warn); }
    .tag-status-approved { background: rgba(108,99,255,0.15); color: var(--accent); }
    .tag-status-sent { background: rgba(74,222,128,0.12); color: var(--accent2); }
    .tag-status-skipped { background: var(--surface2); color: var(--text3); }
    .fit-snippet {
      font-size: 11px;
      color: var(--text2);
      margin-top: 5px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Detail pane ── */
    .detail {
      overflow-y: auto;
      padding: 32px 40px;
    }
    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text3);
      gap: 12px;
    }
    .detail-empty svg { opacity: 0.3; }

    .detail-header {
      margin-bottom: 28px;
    }
    .detail-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .detail-company {
      font-size: 16px;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .detail-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .detail-meta a {
      color: var(--accent);
      font-size: 13px;
      text-decoration: none;
    }
    .detail-meta a:hover { text-decoration: underline; }
    .fit-box {
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text2);
      margin-top: 16px;
      line-height: 1.6;
    }
    .fit-box strong { color: var(--accent); }

    /* ── Sections ── */
    .section {
      margin-bottom: 28px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .editable-area {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .editable-area:focus { border-color: var(--accent); }
    .cover-letter-area { min-height: 280px; }
    .about-area { min-height: 80px; }
    .notes-area { min-height: 60px; }

    /* ── Prefill table ── */
    .prefill-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .prefill-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }
    .prefill-key {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .prefill-val {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    /* ── Action bar ── */
    .action-bar {
      display: flex;
      gap: 12px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      margin-top: 24px;
      position: sticky;
      bottom: 0;
      background: var(--bg);
    }
    .btn {
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
    .btn-success {
      background: var(--accent2);
      color: #000;
    }
    .btn-success:hover { background: #22c55e; transform: translateY(-1px); }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface); color: var(--text); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.08); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      font-size: 13px;
      color: var(--text);
      z-index: 1000;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--accent2); color: var(--accent2); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Copy button ── */
    .copy-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      margin-left: 8px;
      transition: all 0.15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .save-indicator {
      font-size: 11px;
      color: var(--accent2);
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-indicator.show { opacity: 1; }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text3);
      gap: 12px;
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-credit {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .footer-credit a { color: var(--text3); text-decoration: none; }
    .footer-credit a:hover { color: var(--text2); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Job Bot Logo">
      <rect width="32" height="32" rx="8" fill="#6c63ff" fill-opacity="0.15"/>
      <circle cx="16" cy="13" r="5" stroke="#6c63ff" stroke-width="1.8"/>
      <path d="M8 26c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M20 8l2-2M22 10h2M21 12l2 1" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    JobBot
  </div>
  <div class="header-right">
    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-val purple" id="statPending">—</div><div class="stat-label">To Review</div></div>
      <div class="stat"><div class="stat-val green" id="statSent">—</div><div class="stat-label">Sent Total</div></div>
      <div class="stat"><div class="stat-val" id="statDays">—</div><div class="stat-label">Days Active</div></div>
    </div>
    <select class="date-select" id="datePicker" onchange="loadDate(this.value)">
      <option value="">Today</option>
    </select>
  </div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebarHeader">Loading...</div>
    <div id="jobList"><div class="loading"><div class="spinner"></div>Loading applications...</div></div>
  </div>

  <!-- Detail -->
  <div class="detail" id="detail">
    <div class="detail-empty">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="48" rx="6" stroke="#6c63ff" stroke-width="2"/><path d="M20 20h24M20 28h24M20 36h16" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/></svg>
      <div style="font-size:16px; color: var(--text2)">Select an application to review</div>
      <div style="font-size:13px">Review, edit, then launch to apply</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5555';
let currentApps = [];
let currentId = null;
let saveTimeout = null;

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  await loadDates();
  await loadApplications();
  await loadStats();
}

async function loadDates() {
  const res = await fetch(`${API}/api/dates`);
  const dates = await res.json();
  const picker = document.getElementById('datePicker');
  picker.innerHTML = '<option value="">Today</option>';
  dates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = formatDate(d);
    picker.appendChild(opt);
  });
}

async function loadDate(dateStr) {
  await loadApplications(dateStr);
  document.getElementById('detail').innerHTML = `<div class="detail-empty"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="48" rx="6" stroke="#6c63ff" stroke-width="2"/><path d="M20 20h24M20 28h24M20 36h16" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/></svg><div style="font-size:16px; color: var(--text2)">Select an application to review</div></div>`;
  currentId = null;
}

async function loadApplications(dateStr = '') {
  const url = dateStr ? `${API}/api/applications?date=${dateStr}` : `${API}/api/applications`;
  const res = await fetch(url);
  currentApps = await res.json();
  renderSidebar();
}

async function loadStats() {
  const res = await fetch(`${API}/api/stats`);
  const s = await res.json();
  document.getElementById('statPending').textContent = s.today_pending;
  document.getElementById('statSent').textContent = s.total_sent;
  document.getElementById('statDays').textContent = s.days_active;
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function renderSidebar() {
  const pending = currentApps.filter(a => a.status === 'pending_review');
  const rest = currentApps.filter(a => a.status !== 'pending_review');
  
  document.getElementById('sidebarHeader').textContent = `${currentApps.length} Applications · ${pending.length} Pending`;
  
  const sorted = [...pending, ...rest];
  
  document.getElementById('jobList').innerHTML = sorted.map(a => `
    <div class="job-card status-${a.status} ${currentId === a.id ? 'active' : ''}" onclick="selectApp('${a.id}')">
      <div class="job-card-top">
        <div class="job-title">${escHtml(a.title)}</div>
        <div class="score-badge ${a.score >= 7 ? 'high' : 'med'}">${a.score.toFixed(1)}</div>
      </div>
      <div class="job-company">${escHtml(a.company)}</div>
      <div class="job-meta">
        <span class="tag tag-source">${a.source}</span>
        <span class="tag tag-status-${a.status}">${statusLabel(a.status)}</span>
      </div>
      ${a.fit_summary ? `<div class="fit-snippet">${escHtml(a.fit_summary)}</div>` : ''}
    </div>
  `).join('');
}

function statusLabel(s) {
  return { pending_review: 'Pending', approved: 'Approved', sent: '✓ Sent', skipped: 'Skipped', edited: 'Edited' }[s] || s;
}

// ── Detail ─────────────────────────────────────────────────────────────────
async function selectApp(id) {
  currentId = id;
  renderSidebar();
  
  const detail = document.getElementById('detail');
  detail.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  
  const res = await fetch(`${API}/api/application/${id}`);
  const app = await res.json();
  renderDetail(app);
}

function renderDetail(app) {
  const j = app.job;
  const prefill = app.apply_info?.prefill || {};
  const isSent = app.status === 'sent';
  
  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(j.title)}</div>
      <div class="detail-company">${escHtml(j.company)} · ${escHtml(j.location || 'New York, NY')}</div>
      <div class="detail-meta">
        <span class="tag tag-source">${j.source}</span>
        <span class="tag tag-status-${app.status}">${statusLabel(app.status)}</span>
        <a href="${j.url}" target="_blank">View Listing ↗</a>
        ${app.sent_at ? `<span style="font-size:12px;color:var(--text3)">Sent ${formatDateTime(app.sent_at)}</span>` : ''}
      </div>
      ${app.fit_summary ? `<div class="fit-box"><strong>Why you're a fit:</strong> ${escHtml(app.fit_summary)}</div>` : ''}
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">Cover Letter</div>
        <button class="copy-btn" onclick="copyText('coverLetter')">Copy</button>
        <span class="save-indicator" id="clSave">Saved</span>
      </div>
      <textarea id="coverLetter" class="editable-area cover-letter-area" ${isSent ? 'readonly' : ''} oninput="autoSave('${app.id}', 'cover_letter', this.value)">${escHtml(app.cover_letter)}</textarea>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-label">About Me (for form fields)</div>
        <button class="copy-btn" onclick="copyText('aboutMe')">Copy</button>
        <span class="save-indicator" id="amSave">Saved</span>
      </div>
      <textarea id="aboutMe" class="editable-area about-area" ${isSent ? 'readonly' : ''} oninput="autoSave('${app.id}', 'about_me', this.value)">${escHtml(app.about_me)}</textarea>
    </div>

    <div class="section">
      <div class="section-label">Pre-fill Info</div>
      <div class="prefill-grid">
        ${Object.entries(prefill).map(([k, v]) => v ? `
          <div class="prefill-item">
            <div class="prefill-key">${k.replace(/_/g,' ')}</div>
            <div class="prefill-val">${escHtml(String(v))}</div>
          </div>
        ` : '').join('')}
      </div>
    </div>

    ${j.description ? `
    <div class="section">
      <div class="section-header">
        <div class="section-label">Job Description</div>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">from ${j.source}</span>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto">${escHtml(j.description.slice(0, 1500))}${j.description.length > 1500 ? '\n\n...' : ''}</div>
    </div>` : ''}

    <div class="section">
      <div class="section-label">Notes</div>
      <textarea id="notesArea" class="editable-area notes-area" placeholder="Add notes..." oninput="autoSave('${app.id}', 'notes', this.value)">${escHtml(app.notes || '')}</textarea>
    </div>

    <div class="action-bar">
      ${!isSent ? `
        <button class="btn btn-primary" onclick="launchApply('${app.id}')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Open & Apply
        </button>
        <button class="btn btn-success" onclick="markSent('${app.id}')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Mark as Sent
        </button>
        <button class="btn btn-ghost" onclick="skipApp('${app.id}')">Skip</button>
        <button class="btn btn-danger" onclick="skipApp('${app.id}')">✕ Not Interested</button>
      ` : `
        <div style="color:var(--accent2);font-size:14px;font-weight:600">✓ Application sent ${formatDateTime(app.sent_at)}</div>
        <button class="btn btn-ghost" onclick="window.open('${j.url}','_blank')">View Listing ↗</button>
      `}
    </div>
  `;
}

// ── Actions ────────────────────────────────────────────────────────────────
async function launchApply(id) {
  const res = await fetch(`${API}/api/application/${id}/approve`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    window.open(data.apply_url, '_blank');
    showToast('Application opened in new tab. Fill the form and click Mark as Sent when done.', 'success');
    await loadApplications();
    renderSidebar();
  }
}

async function markSent(id) {
  const res = await fetch(`${API}/api/application/${id}/mark_sent`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    showToast('Marked as sent! Great work 🎯', 'success');
    await loadApplications();
    await loadStats();
    renderSidebar();
    // Refresh detail
    const appRes = await fetch(`${API}/api/application/${id}`);
    renderDetail(await appRes.json());
  }
}

async function skipApp(id) {
  await fetch(`${API}/api/application/${id}/skip`, { method: 'POST' });
  showToast('Skipped.', '');
  currentId = null;
  await loadApplications();
  renderSidebar();
  document.getElementById('detail').innerHTML = `<div class="detail-empty"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="48" rx="6" stroke="#6c63ff" stroke-width="2"/><path d="M20 20h24M20 28h24M20 36h16" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/></svg><div style="font-size:16px; color: var(--text2)">Select an application to review</div></div>`;
}

// ── Auto-save ──────────────────────────────────────────────────────────────
function autoSave(id, field, value) {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    await fetch(`${API}/api/application/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [field]: value, status: 'edited' })
    });
    const ind = field === 'cover_letter' ? 'clSave' : field === 'about_me' ? 'amSave' : null;
    if (ind) {
      const el = document.getElementById(ind);
      if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
    }
  }, 800);
}

// ── Utils ──────────────────────────────────────────────────────────────────
function copyText(elId) {
  const el = document.getElementById(elId);
  navigator.clipboard.writeText(el.value);
  showToast('Copied to clipboard', 'success');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  if (!d) return 'Today';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

boot();
